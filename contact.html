        <section class="contact section-padding" data-scroll-index='6'>

                <div class="col-md-12">
                <div class="sectioner-header text-center">
                    <h3>Contact us</h3>
                    <span class="line"></span>
                    <p>Seamlessly plan your dream event with Party Time's user-friendly book form. Effortlessly customize your package, confirm details, and secure your date in just a few clicks. Let's celebrate!</p>
                </div>
                <div class="section-content">
                    <div class="row">
                    <div class="col-sm-12 col-md-12 col-lg-8">
                        <form id="contact_form" action="">
                        <div class="row">
                            <div class="col">
                            <input type="text" id="your_name" class="form-input w-100" name="full-name" placeholder="Full Name" required>
                            </div>
                            <div class="col">
                            <input type="email" id="email" class="form-input w-100" name="email" placeholder="Email" required>
                            </div>
                        </div>
                        <select id="package" class="form-input w-100" name="package">
                            <option value="" disabled selected>Choose package</option>
                            <option value="gold">Gold</option>
                            <option value="silver">Silver</option>
                            <option value="bronze">Bronze</option>
                            <option value="custom">Custom</option>
                        </select>
                        <select id="service" class="form-input w-100" name="service">
                            <option value="" disabled selected>Choose service</option>
                            <option value="wedding">Wedding</option>
                            <option value="birthday">Birthday</option>
                            <option value="social_event">Social Event</option>
                        </select>
                        <input type="text" id="datetime" class="form-input w-100" name="datetime" placeholder="select time" required>                        
                        <textarea class="form-input w-100" id="message" placeholder="Other notes" name="message"></textarea>
                        <button class="btn-grad w-100 text-uppercase" type="submit" name="button">submit</button>
                        </form>

                        </div>

<script>
    // Initialize smooth scrolling
    $.scrollIt({
        easing: 'swing',
        scrollTime: 900,
        activeClass: 'active',
        topOffset: -63
    });
    document.addEventListener('DOMContentLoaded', function() {
        var packageElement = document.querySelector('#package');
        var packageChoices = new Choices(packageElement, {
            removeItemButton: true,
            searchEnabled: false,
            itemSelectText: '',
            placeholder: true,
            placeholderValue: 'Choose package',
            shouldSort: false
        });

        var serviceElement = document.querySelector('#service');
        var serviceChoices = new Choices(serviceElement, {
            removeItemButton: true,
            searchEnabled: false,
            itemSelectText: '',
            placeholder: true,
            placeholderValue: 'Choose service',
            shouldSort: false
        });

        packageElement.addEventListener('change', function() {
            if (this.value === 'custom') {
                serviceChoices.containerOuter.element.style.display = 'none';
            } else {
                serviceChoices.containerOuter.element.style.display = 'block';
            }
        });
    });
    document.getElementById('contact_form').addEventListener('submit', function(event) {
        event.preventDefault(); // Prevent form submission

        var packageSelect = document.getElementById('package');
        var serviceSelect = document.getElementById('service');
        var isValid = true;

        if (packageSelect.value === '') {
            alert('Please choose a package.');
            isValid = false;
        }

        if (packageSelect.value !== 'custom' && serviceSelect.value === '') {
            alert('Please choose a service.');
            isValid = false;
        }

        // If the form is valid, submit it and display a success message
        if (isValid) {
            this.submit(); // Manually submit the form

            alert('Submitted successfully. We will be in touch with you soon.');
        }
    });
    flatpickr("#datetime", {
    enableTime: true,
    dateFormat: "Y-m-d H:i",
    minDate: "today",});

    $(document).ready(function() {
        $('#package').change(function() {
            if ($(this).val() === 'custom') {
                $('#message').attr('placeholder', 'Tell us about your party');
                $('#message').attr('required', true);
            } else {
                $('#message').attr('placeholder', 'Other notes');
                $('#message').removeAttr('required');
            }
        });
    });
</script>
